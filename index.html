<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Chiang — Personal Site</title>

    <!-- Security: Content Security Policy -->
    <!-- No 'unsafe-inline' in script-src — prevents inline XSS execution -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' https://api.openai.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <!-- Security: prevent leaking the full URL to third-party referrers -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Security: anti-clickjacking in external script (no unsafe-inline needed) -->
    <script src="/clickjack-guard.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
